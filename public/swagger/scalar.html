<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>InstantBackend API</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/@scalar/api-reference@1.44.20/dist/style.css"
    />
    <style>
      body {
        margin: 0;
      }
      #swagger-ui {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/@scalar/api-reference@1.44.20/dist/browser/standalone.js"></script>
    <script>
      window.onload = () => {
        if (window.Scalar && window.Scalar.createApiReference) {
          window.Scalar.createApiReference("#swagger-ui", {
            url: "simple-backend-Prod-oas30.yaml",
          });
          return;
        }

        console.error("Scalar API Reference failed to load.");
      };
    </script>
  </body>
</html>
